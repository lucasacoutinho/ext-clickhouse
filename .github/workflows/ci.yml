name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: phpize

      - name: Install C/C++ tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format clang-tidy

      - name: Check C/C++ formatting
        run: |
          git ls-files '*.cpp' '*.h' \
            | grep -Ev '^(clickhouse-cpp|build)/' \
            | grep -Ev '^(clickhouse_arginfo.h|src/error_codes.cpp)$' \
            | xargs clang-format --dry-run --Werror

      - name: Run clang-tidy
        run: |
          phpize
          ./configure --enable-clickhouse
          php_includes="$(php-config --includes)"
          common_args="-std=c++17 -DHAVE_CONFIG_H=1 -DZEND_ENABLE_STATIC_TSRMLS_CACHE=1 \
            -I. -Iclickhouse-cpp -Iclickhouse-cpp/contrib/absl \
            -Iclickhouse-cpp/contrib/cityhash/cityhash -Iclickhouse-cpp/contrib/lz4/lz4 \
            -Iclickhouse-cpp/contrib/zstd/zstd $php_includes"
          git ls-files '*.cpp' \
            | grep -Ev '^(clickhouse-cpp|build)/' \
            | grep -Ev '^src/error_codes.cpp$' \
            | while read -r file; do clang-tidy --quiet "$file" -- $common_args; done

  sanitizers:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpize

      - name: Build and test with ASAN/UBSAN
        run: |
          phpize
          sanitizer_flags="-fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g"
          CFLAGS="$sanitizer_flags" \
          CXXFLAGS="$sanitizer_flags" \
          LDFLAGS="-fsanitize=address,undefined" \
            ./configure --enable-clickhouse
          make clean || true
          make -j"$(nproc)"
          asan_lib="$(cc -print-file-name=libasan.so)"
          USE_ZEND_ALLOC=0 \
          LD_PRELOAD="$asan_lib" \
          CLICKHOUSE_SANITIZER=1 \
          ASAN_OPTIONS="detect_leaks=0:abort_on_error=1" \
          UBSAN_OPTIONS="halt_on_error=1:print_stacktrace=1" \
            php run-tests.php -d extension=modules/clickhouse.so --show-diff -q tests/0*.phpt

  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpize

      - name: Build extension
        run: |
          phpize
          ./configure --enable-clickhouse
          make -j$(nproc)

      - name: Run unit tests
        run: |
          TEST_PHP_EXECUTABLE=$(which php) \
            php run-tests.php -d extension=modules/clickhouse.so \
            --show-diff -q tests/0*.phpt

      - name: Run integration tests
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: '9000'
        run: |
          TEST_PHP_EXECUTABLE=$(which php) \
            php run-tests.php -d extension=modules/clickhouse.so \
            --show-diff -q tests/1*.phpt
